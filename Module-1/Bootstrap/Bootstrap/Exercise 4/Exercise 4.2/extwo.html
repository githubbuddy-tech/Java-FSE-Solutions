<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Four Column Layout</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Four Column Responsive Layout
        </h2>

        <div class="row text-center">

            <!-- Column 1 -->
            <div class="col-sm-3 mb-4">

                <div class="bg-primary text-white p-4 rounded">

                    <h4>Column 1</h4>

                    <p>
                        First section
                    </p>

                </div>

            </div>

            <!-- Column 2 -->
            <div class="col-sm-3 mb-4">

                <div class="bg-success text-white p-4 rounded">

                    <h4>Column 2</h4>

                    <p>
                        Second section
                    </p>

                </div>

            </div>

            <!-- Column 3 -->
            <div class="col-sm-3 mb-4">

                <div class="bg-warning text-dark p-4 rounded">

                    <h4>Column 3</h4>

                    <p>
                        Third section
                    </p>

                </div>

            </div>

            <!-- Column 4 -->
            <div class="col-sm-3 mb-4">

                <div class="bg-danger text-white p-4 rounded">

                    <h4>Column 4</h4>

                    <p>
                        Fourth section
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
