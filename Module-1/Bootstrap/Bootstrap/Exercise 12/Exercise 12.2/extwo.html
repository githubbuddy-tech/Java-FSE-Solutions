<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Pricing Section</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <!-- Section Heading -->
        <div class="text-center mb-5">

            <h1 class="text-primary">
                Pricing Plans
            </h1>

            <p class="text-muted mt-3">
                Choose a plan that suits your needs.
            </p>

        </div>

        <!-- Pricing Cards -->
        <div class="row g-4">

            <!-- Basic Plan -->
            <div class="col-md-4">

                <div class="card h-100 shadow-sm p-3 text-center">

                    <div class="card-body">

                        <h3 class="card-title text-primary mb-3">
                            Basic
                        </h3>

                        <h2 class="fw-bold mb-4">
                            ₹499
                        </h2>

                        <p class="mb-2">
                            5 Projects
                        </p>

                        <p class="mb-2">
                            10 GB Storage
                        </p>

                        <p class="mb-4">
                            Email Support
                        </p>

                        <button class="btn btn-outline-primary px-4">
                            Choose Plan
                        </button>

                    </div>

                </div>

            </div>

            <!-- Standard Plan -->
            <div class="col-md-4">

                <div class="card h-100 shadow p-4 text-center border-primary">

                    <div class="card-body">

                        <h3 class="card-title text-success mb-3">
                            Standard
                        </h3>

                        <h2 class="fw-bold mb-4">
                            ₹999
                        </h2>

                        <p class="mb-2">
                            15 Projects
                        </p>

                        <p class="mb-2">
                            50 GB Storage
                        </p>

                        <p class="mb-4">
                            Priority Support
                        </p>

                        <button class="btn btn-success px-4">
                            Choose Plan
                        </button>

                    </div>

                </div>

            </div>

            <!-- Premium Plan -->
            <div class="col-md-4">

                <div class="card h-100 shadow-sm p-3 text-center">

                    <div class="card-body">

                        <h3 class="card-title text-danger mb-3">
                            Premium
                        </h3>

                        <h2 class="fw-bold mb-4">
                            ₹1499
                        </h2>

                        <p class="mb-2">
                            Unlimited Projects
                        </p>

                        <p class="mb-2">
                            100 GB Storage
                        </p>

                        <p class="mb-4">
                            24/7 Support
                        </p>

                        <button class="btn btn-outline-danger px-4">
                            Choose Plan
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
