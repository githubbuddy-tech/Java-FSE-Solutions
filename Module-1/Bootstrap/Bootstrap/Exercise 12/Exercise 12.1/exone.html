<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Spacing Utilities</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-4">

        <h2 class="text-center text-primary mb-4">
            Bootstrap Spacing Utilities
        </h2>

        <!-- Section 1 -->
        <div class="bg-primary text-white p-2 m-3 rounded">

            <h4>
                Section One
            </h4>

            <p class="mb-0">
                This section uses padding (p-2) and margin (m-3).
            </p>

        </div>

        <!-- Section 2 -->
        <div class="bg-success text-white py-5 mt-4 rounded text-center">

            <h4>
                Section Two
            </h4>

            <p class="mb-0">
                This section uses vertical padding (py-5) and top margin (mt-4).
            </p>

        </div>

        <!-- Section 3 -->
        <div class="bg-warning text-dark p-4 mt-4 rounded">

            <h4>
                Section Three
            </h4>

            <p class="mb-0">
                Bootstrap spacing utilities help create cleaner layouts easily.
            </p>

        </div>

    </div>

</body>

</html>
