<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Borders and Rounded Utilities</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5 text-center">

        <h2 class="text-primary mb-4">
            Bootstrap Border Utilities
        </h2>

        <!-- Profile Image -->
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400"
             alt="Profile Image"

             class="border
                    border-primary
                    border-3
                    rounded-circle
                    shadow-lg"

             width="220"
             height="220">

        <p class="mt-4 text-muted">
            Circular profile image with border, shadow and rounded utilities.
        </p>

    </div>

</body>

</html>
