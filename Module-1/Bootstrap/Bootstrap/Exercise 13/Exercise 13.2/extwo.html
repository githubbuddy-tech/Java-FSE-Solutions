<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Gradient Background</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Gradient Section -->
        <div class="bg-dark
                    bg-gradient
                    text-white
                    p-5
                    rounded
                    shadow-lg
                    text-center">

            <h1 class="fw-bold mb-3">
                Welcome to the Dashboard
            </h1>

            <p class="lead mb-4">
                This section uses Bootstrap gradient background utilities with dark theme styling.
            </p>

            <button class="btn btn-outline-light">
                Learn More
            </button>

        </div>

    </div>

</body>

</html>
