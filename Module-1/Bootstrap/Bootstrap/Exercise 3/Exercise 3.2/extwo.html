<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Container Row Column</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Container Starts -->
    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Bootstrap Responsive Layout
        </h2>

        <!-- Row Starts -->
        <div class="row">

            <!-- First Column -->
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">

                <div class="card shadow-sm h-100">

                    <div class="card-body text-center">

                        <h4 class="text-primary">
                            Web Design
                        </h4>

                        <p>
                            Learn responsive webpage designing using Bootstrap classes.
                        </p>

                    </div>

                </div>

            </div>

            <!-- Second Column -->
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">

                <div class="card shadow-sm h-100">

                    <div class="card-body text-center">

                        <h4 class="text-success">
                            Frontend Development
                        </h4>

                        <p>
                            Build attractive user interfaces with Bootstrap components.
                        </p>

                    </div>

                </div>

            </div>

            <!-- Third Column -->
            <div class="col-sm-12 col-md-6 col-lg-4 mb-4">

                <div class="card shadow-sm h-100">

                    <div class="card-body text-center">

                        <h4 class="text-danger">
                            Responsive Layout
                        </h4>

                        <p>
                            Layout automatically adjusts for mobile, tablet and desktop.
                        </p>

                    </div>

                </div>

            </div>

        </div>
        <!-- Row Ends -->

    </div>
    <!-- Container Ends -->

</body>

</html>
