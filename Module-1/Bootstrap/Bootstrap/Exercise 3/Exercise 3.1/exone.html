<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Grid Layout</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Responsive Grid Example
        </h2>

        <div class="row">

            <!-- Column 1 -->
            <div class="col-12 col-md-6 col-lg-4 mb-4">

                <div class="bg-primary text-white p-4 rounded text-center">

                    <h4>Column 1</h4>

                    <p>
                        This column adjusts according to screen size.
                    </p>

                </div>

            </div>

            <!-- Column 2 -->
            <div class="col-12 col-md-6 col-lg-4 mb-4">

                <div class="bg-success text-white p-4 rounded text-center">

                    <h4>Column 2</h4>

                    <p>
                        Responsive Bootstrap grid layout.
                    </p>

                </div>

            </div>

            <!-- Column 3 -->
            <div class="col-12 col-md-6 col-lg-4 mb-4">

                <div class="bg-danger text-white p-4 rounded text-center">

                    <h4>Column 3</h4>

                    <p>
                        Works on mobile, tablet and desktop.
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
