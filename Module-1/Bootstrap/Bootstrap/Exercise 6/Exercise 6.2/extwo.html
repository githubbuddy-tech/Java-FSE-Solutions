<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Card Flexbox Layout</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-sm p-3">

            <!-- Flex Container -->
            <div class="d-flex
                        justify-content-between
                        align-items-center">

                <!-- Left Content -->
                <div>

                    <h4 class="mb-1 text-primary">
                        Web Development
                    </h4>

                    <p class="mb-0 text-muted">
                        Learn Bootstrap Flexbox utilities easily.
                    </p>

                </div>

                <!-- Right Content -->
                <button class="btn btn-success">
                    Explore
                </button>

            </div>

        </div>

    </div>

</body>

</html>
