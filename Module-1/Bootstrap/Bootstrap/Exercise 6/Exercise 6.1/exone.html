<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Flex Navbar</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="bg-dark p-3">

        <div class="container">

            <!-- Flex Container -->
            <div class="d-flex
                        flex-column
                        flex-md-row
                        justify-content-between
                        align-items-center">

                <!-- Logo -->
                <h3 class="text-white mb-3 mb-md-0">
                    MyWebsite
                </h3>

                <!-- Navigation Links -->
                <div class="d-flex flex-column flex-md-row">

                    <a href="#"
                       class="text-white text-decoration-none me-md-4 mb-2 mb-md-0">

                        Home
                    </a>

                    <a href="#"
                       class="text-white text-decoration-none me-md-4 mb-2 mb-md-0">

                        About
                    </a>

                    <a href="#"
                       class="text-white text-decoration-none me-md-4 mb-2 mb-md-0">

                        Services
                    </a>

                    <a href="#"
                       class="text-white text-decoration-none">

                        Contact
                    </a>

                </div>

            </div>

        </div>

    </nav>

</body>

</html>
