<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fixed Footer Example</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Main Content -->
    <div class="container mt-5 mb-5">

        <h1 class="text-primary mb-4">
            Fixed Footer Example
        </h1>

        <p class="lead">
            This page demonstrates Bootstrap positioning utilities.
        </p>

        <p>
            The footer remains fixed at the bottom of the screen even when the page is scrolled.
        </p>

        <div class="bg-white p-4 rounded shadow-sm mt-4">

            <p>
                Bootstrap provides utility classes for fixed, absolute, relative,
                and sticky positioning.
            </p>

        </div>

    </div>

    <!-- Fixed Footer -->
    <footer class="position-fixed
                   bottom-0
                   start-0
                   w-100
                   bg-dark
                   text-white
                   text-center
                   py-3">

        © 2025 MyWebsite | All Rights Reserved

    </footer>

</body>

</html>
