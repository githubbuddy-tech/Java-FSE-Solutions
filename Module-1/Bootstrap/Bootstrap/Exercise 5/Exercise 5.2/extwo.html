<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Column Reordering</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Column Reordering Example
        </h2>

        <div class="row text-center">

            <!-- First Column -->
            <div class="col-md-6 order-md-2 mb-4">

                <div class="bg-primary text-white p-5 rounded">

                    <h3>
                        First Column
                    </h3>

                    <p class="mb-0">
                        This column appears second on medium and larger screens.
                    </p>

                </div>

            </div>

            <!-- Second Column -->
            <div class="col-md-6 order-md-1 mb-4">

                <div class="bg-success text-white p-5 rounded">

                    <h3>
                        Second Column
                    </h3>

                    <p class="mb-0">
                        This column appears first on medium and larger screens.
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
