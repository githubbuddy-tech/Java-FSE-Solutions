<!DOCTYPE html>
<html>
<head>
    <title>Community Event Gallery</title>
    <style>
        .imageStyle {
            border: 3px solid black;
        }

        table {
            margin: auto;
        }

        td {
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center; background-color: red">Community Event Gallery</h2>
    <table>
        <tr>
            <td>
                <img src="music.jpg" alt="music event" title="music event" width="150" height="100" class="imageStyle">
                <p>Music festival</p>
            </td>

            <td>
                <img src="sports.webp" alt="sports event" title="sports event" width="150" height="100" class="imageStyle">
                <p>Sports day</p>
            </td>

            <td>
                <img src="food.jpg" alt="food event" title="food event" width="150" height="100" class="imageStyle">
                <p>Food festival</p>
            </td>
        </tr>
        <tr>
            <td>
                <img src="dance.jpg" alt="dance event" title="dance event" width="150" height="100" class="imageStyle">
                <p>Dance program</p>
            </td>
            <td>
                <img src="art.jpg" alt="art event" title="art event" width="150" height="100" class="imageStyle">
                <p>Art exhibition</p>
            </td>
            <td>
                <img src="community.webp" alt="community meeting" title="community meeting" width="150" height="100" class="imageStyle">
                <p>Community meeting</p>
            </td>
        </tr>
    </table>
</body>
</html>
