<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Button Classes</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-sm p-4">

            <h2 class="text-center text-primary mb-4">
                Bootstrap Button Styles
            </h2>

            <!-- Solid Buttons -->
            <h5 class="mb-3">
                Contextual Buttons
            </h5>

            <div class="mb-4">

                <button class="btn btn-primary me-2 mb-2">
                    Primary
                </button>

                <button class="btn btn-secondary me-2 mb-2">
                    Secondary
                </button>

                <button class="btn btn-success me-2 mb-2">
                    Success
                </button>

                <button class="btn btn-danger me-2 mb-2">
                    Danger
                </button>

                <button class="btn btn-warning me-2 mb-2">
                    Warning
                </button>

                <button class="btn btn-info me-2 mb-2">
                    Info
                </button>

                <button class="btn btn-dark me-2 mb-2">
                    Dark
                </button>

            </div>

            <!-- Outline Buttons -->
            <h5 class="mb-3">
                Outline Buttons
            </h5>

            <div>

                <button class="btn btn-outline-primary me-2 mb-2">
                    Primary
                </button>

                <button class="btn btn-outline-secondary me-2 mb-2">
                    Secondary
                </button>

                <button class="btn btn-outline-success me-2 mb-2">
                    Success
                </button>

                <button class="btn btn-outline-danger me-2 mb-2">
                    Danger
                </button>

                <button class="btn btn-outline-warning me-2 mb-2">
                    Warning
                </button>

                <button class="btn btn-outline-info me-2 mb-2">
                    Info
                </button>

                <button class="btn btn-outline-dark me-2 mb-2">
                    Dark
                </button>

            </div>

        </div>

    </div>

</body>

</html>
