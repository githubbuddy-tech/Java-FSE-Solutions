<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flex Alignment Example</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Row with Flex Alignment -->
        <div class="row
                    justify-content-center
                    align-items-center
                    bg-secondary
                    text-white
                    rounded"
             style="height: 300px;">

            <div class="col-md-6">

                <div class="bg-dark p-4 rounded text-center">

                    <h2>
                        Centered Content
                    </h2>

                    <p class="mb-0">
                        Content is aligned horizontally and vertically using Bootstrap flex utilities.
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
