<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Nav Tabs and Pills</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-sm p-4">

            <h2 class="text-primary mb-4">
                Bootstrap Navigation Styles
            </h2>

            <!-- Basic Nav -->
            <h5 class="mb-3">
                Basic Navigation
            </h5>

            <ul class="nav mb-4">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="#">

                        Home
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        About
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Services
                    </a>

                </li>

            </ul>

            <!-- Nav Tabs -->
            <h5 class="mb-3">
                Nav Tabs
            </h5>

            <ul class="nav nav-tabs mb-4">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="#">

                        Profile
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Messages
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Settings
                    </a>

                </li>

            </ul>

            <!-- Nav Pills -->
            <h5 class="mb-3">
                Nav Pills
            </h5>

            <ul class="nav nav-pills">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="#">

                        Dashboard
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Projects
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                        Reports
                    </a>

                </li>

            </ul>

        </div>

    </div>

</body>

</html>
