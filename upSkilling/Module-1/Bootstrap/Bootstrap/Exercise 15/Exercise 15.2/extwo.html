<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Shadows and Rounded Pill</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <!-- Card -->
                <div class="card

                            rounded-pill

                            p-4
                            text-center">

                    <div class="card-body">

                        <h2 class="text-primary mb-3">
                            Premium Plan
                        </h2>

                        <p class="text-muted mb-4">
                            Enjoy advanced features and unlimited access with our premium membership.
                        </p>

                        <h3 class="fw-bold mb-4">
                            ₹999 / Month
                        </h3>

                        <button class="btn btn-primary rounded-pill px-4">
                            Subscribe Now
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
