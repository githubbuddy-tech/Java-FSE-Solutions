<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Sidebar</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2
                        d-none d-md-block
                        bg-dark text-white
                        min-vh-100 p-4">

                <h3 class="mb-4">
                    Dashboard
                </h3>

                <ul class="nav flex-column">

                    <li class="nav-item mb-3">

                        <a href="#"
                           class="nav-link text-white">

                            Home
                        </a>

                    </li>

                    <li class="nav-item mb-3">

                        <a href="#"
                           class="nav-link text-white">

                            Profile
                        </a>

                    </li>

                    <li class="nav-item mb-3">

                        <a href="#"
                           class="nav-link text-white">

                            Settings
                        </a>

                    </li>

                    <li class="nav-item">

                        <a href="#"
                           class="nav-link text-white">

                            Logout
                        </a>

                    </li>

                </ul>

            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-5">

                <h1 class="text-primary mb-4">
                    Main Content Area
                </h1>

                <p class="lead">
                    This sidebar appears only on tablets and larger screens.
                </p>

                <p>
                    On mobile devices, the sidebar remains hidden using Bootstrap
                    display utility classes.
                </p>

                <button class="btn btn-primary mt-3">
                    Learn More
                </button>

            </div>

        </div>

    </div>

</body>

</html>
