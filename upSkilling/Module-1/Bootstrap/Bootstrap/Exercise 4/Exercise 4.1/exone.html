<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Two Column Layout</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-3 mb-4">

                <div class="bg-dark text-white p-4 rounded h-100">

                    <h3 class="mb-3">
                        Sidebar
                    </h3>

                    <ul class="list-unstyled">

                        <li class="mb-2">Home</li>
                        <li class="mb-2">Profile</li>
                        <li class="mb-2">Services</li>
                        <li class="mb-2">Contact</li>

                    </ul>

                </div>

            </div>

            <!-- Main Content -->
            <div class="col-md-9">

                <div class="bg-white p-4 rounded shadow-sm">

                    <h2 class="text-primary mb-3">
                        Main Content Area
                    </h2>

                    <p>
                        This section represents the main content area of the webpage.
                        The layout is created using Bootstrap grid classes.
                    </p>

                    <p>
                        On medium and larger screens, the sidebar occupies 3 columns
                        and the content section occupies 9 columns.
                    </p>

                    <button class="btn btn-primary mt-2">
                        Read More
                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
