<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Dashboard</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <a href="#"
               class="navbar-brand fw-bold">

                Admin Dashboard
            </a>

        </div>

    </nav>

    <!-- Dashboard Section -->
    <div class="container mt-5">

        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-md-3">

                <div class="bg-primary text-white p-4 rounded shadow-sm">

                    <h5>
                        Total Users
                    </h5>

                    <h2 class="fw-bold">
                        1,250
                    </h2>

                </div>

            </div>

            <!-- Card 2 -->
            <div class="col-md-3">

                <div class="bg-success text-white p-4 rounded shadow-sm">

                    <h5>
                        Revenue
                    </h5>

                    <h2 class="fw-bold">
                        ₹75K
                    </h2>

                </div>

            </div>

            <!-- Card 3 -->
            <div class="col-md-3">

                <div class="bg-warning text-dark p-4 rounded shadow-sm">

                    <h5>
                        Pending Orders
                    </h5>

                    <h2 class="fw-bold">
                        45
                    </h2>

                </div>

            </div>

            <!-- Card 4 -->
            <div class="col-md-3">

                <div class="bg-danger text-white p-4 rounded shadow-sm">

                    <h5>
                        Issues Reported
                    </h5>

                    <h2 class="fw-bold">
                        12
                    </h2>

                </div>

            </div>

        </div>

        <!-- Recent Activity Section -->
        <div class="bg-white p-4 rounded shadow-sm mt-5">

            <h3 class="text-primary mb-3">
                Recent Activity
            </h3>

            <p class="text-muted">
                Latest updates from the system dashboard are displayed here.
            </p>

            <ul class="list-group">

                <li class="list-group-item">
                    New user registered successfully.
                </li>

                <li class="list-group-item">
                    Payment received from premium member.
                </li>

                <li class="list-group-item">
                    Server maintenance scheduled tonight.
                </li>

            </ul>

        </div>

    </div>

</body>

</html>
