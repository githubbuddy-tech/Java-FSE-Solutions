<!DOCTYPE html>
<html>
<head>
    <title>Debugging Example</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        .box {
            width: 300px;
            margin: auto;
            margin-top: 50px;
            border: 2px solid black;
            padding: 20px;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Community Event Portal</h2>

        <button onclick="showMessage()">
            Click Me
        </button>
        <p id="result"></p>
    </div>
    <script>
        function showMessage() {
            let eventName = "Music Event";
            console.log("Selected Event:",
            eventName);
            document.getElementById(
            "result").innerHTML =
            "Welcome to " + eventName;
        }
    </script>
</body>
</html>
