<h2>Enrollment Request Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->
  <div class="form-group">
    <label for="studentName">Student Name</label>
    <input
      type="text"
      id="studentName"
      name="studentName"
      [(ngModel)]="studentName"
      #nameCtrl="ngModel"
      required
      minlength="3" />

    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
      Name is required
    </span>
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
    </span>
  </div>

  <!-- Student Email -->
  <div class="form-group">
    <label for="studentEmail">Student Email</label>
    <input
      type="email"
      id="studentEmail"
      name="studentEmail"
      [(ngModel)]="studentEmail"
      #emailCtrl="ngModel"
      required
      email />

    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
      Email is required
    </span>
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
      Enter a valid email address
    </span>
  </div>

  <!-- Course ID -->
  <div class="form-group">
    <label for="courseId">Course ID</label>
    <input
      type="number"
      id="courseId"
      name="courseId"
      [(ngModel)]="courseId"
      #courseCtrl="ngModel"
      required />

    <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
      Course ID is required
    </span>
  </div>

  <!-- Preferred Semester -->
  <div class="form-group">
    <label for="preferredSemester">Preferred Semester</label>
    <select
      id="preferredSemester"
      name="preferredSemester"
      [(ngModel)]="preferredSemester"
      #semesterCtrl="ngModel"
      required>
      <option value="" disabled>Select a semester</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>

    <span *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']">
      Please select a semester
    </span>
  </div>

  <!-- Agree to Terms -->
  <<div class="form-group">
  <label class="checkbox-label">
    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      #termsCtrl="ngModel"
      required />
    I agree to the terms and conditions
  </label>

  <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
    You must agree to the terms to continue
  </span>
</div>

  <!-- Buttons -->
  <div class="form-actions">
    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" (click)="onReset(enrollForm)">Reset</button>
  </div>

  

</form>

<div *ngIf="submitted" class="success-message">
  Enrollment request submitted successfully!
</div>
