<div class="container">

    <h1>Reactive Enrollment Form</h1>

    <form
            [formGroup]="enrollForm"
            (ngSubmit)="submitForm()">

        <label>Student Name</label>

        <input
                type="text"
                formControlName="studentName">

        <span
                *ngIf="enrollForm.get('studentName')?.touched &&
                enrollForm.get('studentName')?.errors?.['required']">

            Student Name Required

        </span>

        <span
                *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">

            Minimum 3 Characters

        </span>

        <br><br>

        <label>Student Email</label>

        <input
                type="email"
                formControlName="studentEmail">

        <span
                *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">

            Email Required

        </span>

        <span
                *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">

            Invalid Email

        </span>

        <span
                *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">

            Email Taken

        </span>

        <br><br>

        <label>Course ID</label>

        <input
                type="text"
                formControlName="courseId">

        <span
                *ngIf="enrollForm.get('courseId')?.errors?.['required']">

            Course Required

        </span>

        <span
                *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

            Course code starting with XX is not allowed.

        </span>

        <br><br>

        <label>Preferred Semester</label>

        <select formControlName="preferredSemester">

            <option>Odd</option>

            <option>Even</option>

        </select>

        <br><br>

        <label>

            <input
                    type="checkbox"
                    formControlName="agreeToTerms">

            I Agree Terms

        </label>

        <span
                *ngIf="enrollForm.get('agreeToTerms')?.errors?.['requiredTrue']">

            Please Accept Terms

        </span>

        <br><br>

        <h3>Additional Courses</h3>

        <div formArrayName="additionalCourses">

            <div
                    *ngFor="let ctrl of additionalCourses.controls; let i = index">

                <input
                        type="text"
                        [formControl]="$any(ctrl)">

                <button
                        type="button"
                        (click)="removeCourse(i)">

                    Remove

                </button>

            </div>

        </div>

        <br>

        <button
                type="button"
                (click)="addCourse()">

            Add Another Course

        </button>

        <br><br>

        <button
                type="submit"
                [disabled]="enrollForm.invalid">

            Submit

        </button>

    </form>

</div>
