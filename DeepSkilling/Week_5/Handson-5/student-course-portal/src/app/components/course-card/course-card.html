<div class="course-card" [ngClass]="cardClasses" [ngStyle]="{ 'border-left-color': borderColor }">
  <p><strong>ID:</strong> {{ course.id }}</p>
  <p><strong>Name:</strong> {{ course.name }}</p>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>

  <span [ngSwitch]="course.gradeStatus" class="badge">
    <span *ngSwitchCase="'passed'" class="badge badge--passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge--failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge badge--pending">Pending</span>
  </span>

  <div>
    <button (click)="onEnrollClick()">Enroll</button>
    <button (click)="toggleDetails()">Show Details</button>
  </div>

  <div *ngIf="isExpanded" class="details">
    <p>Additional details for {{ course.name }} would appear here.</p>
  </div>
</div>
